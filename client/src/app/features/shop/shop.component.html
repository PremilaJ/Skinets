
@if(products){
<div class="flex gap-3 flex-col">
   <div class=" flex justify-between">
      <div class="flex gap-3">
         <mat-paginator  (page)="handlePageEvent($event)" 
         [length]="products.count"
         [pageIndex]="shopParams.pageIndex -1"
         [pageSize]="shopParams.pageSize"
         [showFirstLastButtons]="true"
         [pageSizeOptions]="pageSizeOptions"
         aria-label="Select page">
             
         </mat-paginator>
         <form #searchForm="ngForm" 
         (ngSubmit)="onSearchChange() " class="relative flex items-center w-full max-w-md mx-4">
            
            <input type="search" class="block p-4 w- full text-sm
             text-gray-900 border border-gray-200 rounded-lg"
             placeholder='Search' name='search' [(ngModel)]="shopParams.search">
             <button mat-icon-button type= "submit" class="absolute inset-y-0 right-8 top-2 flex items-center pl-3">
                  <mat-icon>Search</mat-icon>
             </button>
             
         </form>
            <button class="match-input-heightclass" mat-stroked-button (click)="openFilterDialog()">
         <mat-icon>filter_list</mat-icon>
         Filters
        </button>
         <button mat-stroked-button [matMenuTriggerFor]="sortMenu">
         <mat-icon>swap_vert</mat-icon>
         Sort
        </button>
      </div>
       
   </div>
    <div class="grid grid-cols-5 gap-4">
@for (product of products.data; track product.id) {
   <app-product-item   [product]="product"></app-product-item>
}
</div>
  
</div>
<mat-menu #sortMenu="matMenu">
   <mat-selection-list [multiple]="false" (selectionChange)="onSelectionChange($event)">
      
         @for (sortOption of sortOptions; track $index) {
            <mat-list-option [value]="sortOption.value" [selected]="shopParams.sort===sortOption.name">
               {{sortOption.name}}
            </mat-list-option>
         }
   </mat-selection-list>
         
     
</mat-menu>

}
