<div>
    <h3 class="text-3xl pt-6 text-center mb-3">Filters</h3>
    <mat-divider></mat-divider>
        <div class="flex p-4">
            <div class="w-1/2">
                <h3 class=" text-xl font-semibold text-primary"> Brands</h3>
                <mat-selection-list [(ngModel)]="selectedBrands">
                    @for (brand of shopSrvc.brands; track $index) {
                        <mat-list-option [value]="brand">{{brand}}</mat-list-option>
                    }
                </mat-selection-list>
            </div>
           <div class="w-1/2">
                <h3 class=" text-xl font-semibold text-primary"> Types</h3>
                <mat-selection-list [(ngModel)]="selectedTypes">
                    @for (type of shopSrvc.types; track $index) {
                        <mat-list-option [value]="type">{{type}}</mat-list-option>
                    }
                </mat-selection-list>


            </div>
            <div class="flex justify-end p-4">
                <button mat-flat-button (click)="applyFilters()">
                  Apply Filters
                </button>
            </div>
        </div>
    
</div>
