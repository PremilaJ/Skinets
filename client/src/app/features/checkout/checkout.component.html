<div class="flex mt-32">
  <div class="w-3/4">
    <mat-stepper #stepper (selectionChange)="onStepperChange($event)" [linear]="true"
    class="bg-white border border-gray-300 shadow-sm">
      <mat-step label="Address" [completed]="completeStatus().address">
        <div id="address-element"></div>
        <div class="flex justify-between mt-1">
          <mat-checkbox  [checked]="saveAddress" (change)="onSaveAddressChange($event)">
            Save address to default
          </mat-checkbox>

        </div>
        <div class="flex justify-between mt-6">
          <button  class="z-0" mat-stroked-button routerLink="/shop">Continue shopping</button>
          <button  [disabled]="!completeStatus().address"
          class="z-0" mat-flat-button matStepperNext>Next</button>

        </div>
       
      </mat-step>
      <mat-step label="shipping" [completed]="completeStatus().delivery">
       <app-checkout-delivery  (deliveryComplete)="handleDeliveryChange($event)"></app-checkout-delivery>
       <div class="flex justify-between mt-6">
          <button mat-stroked-button matStepperPrevious>Back</button>
          <button [disabled]="!completeStatus().delivery"
           mat-flat-button matStepperNext>Next</button>

        </div>
      </mat-step>
      <mat-step label="payment"  [completed]="completeStatus().payment">
        <div id="payment-element">
        </div>
        <div class="flex justify-between mt-6">
          <button mat-stroked-button matStepperPrevious>Back</button>
          <button [disabled]="!completeStatus().payment" 
          mat-flat-button matStepperNext>Next</button>

        </div>
      </mat-step>
      <mat-step label="confirmation">
        <app-checkout-review [confirmationToken]="confirmationtoken"></app-checkout-review>>
         <div class="flex justify-between mt-6">
          <button mat-stroked-button matStepperPrevious>Back</button>
          <button (click)="confirmPayment(stepper)"  [disabled]="!confirmPayment ||loading"   mat-flat-button >
            @if(loading)
            {
              <mat-spinner diameter="20"></mat-spinner>
            }
            @else{
                Pay {{cartSrvc.totals()?.total | currency}}
            }
            </button>

        </div>
      </mat-step>
    </mat-stepper>
    <pre>{{completeStatus() | json}}</pre>
  </div>

  <div class="w-1/4">
    <app-order-summary></app-order-summary>
  </div>
</div>
