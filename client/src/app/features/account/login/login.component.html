<mat-card class="p-8 bg-white max-w-lg mt-32 mx-auto">
    <form [formGroup]="loginform" (ngSubmit)="onSubmit()">
        <div class="text-center mb-6">
            <h1 class="text-green-500 text-3xl font-semibold">
                login
            </h1>
        </div>
        <mat-form-field appearance="outline" class="w-full mb-4">
            <mat-label>
                Email
            </mat-label>
            <input matInput type="email" formControlName="email" placeholder="name@gmail.com"/>
        </mat-form-field>
        <mat-form-field appearance="outline" class="w-full mb-4">
            <mat-label>
                Password
            </mat-label>
            <input matInput formControlName="password" type="password" placeholder="password"/>
        </mat-form-field>
        <button mat-flat-button type="submit" class="w-full py-2">Sign In</button>
    </form>

</mat-card>
