<mat-card class="p-8 bg-white max-w-lg mt-32 mx-auto">
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
        <div class="text-center mb-6">
            <h1 class="text-green-500 text-3xl font-semibold">
                Register
            </h1>
        </div>
        <app-text-input label="first name" formControlName="firstName"/>
        <app-text-input label="last name" formControlName="lastName"/>
        <app-text-input label="email" formControlName="email"/>
        <app-text-input label="password" formControlName="password"/>
        
        @if (validationErrors)
        {
            <div class="mb-3 p-4 bg-red-100 text-red-800"> 
                <ul class="list-disc px-3">
                    @for (err of validationErrors; track $index) {
                        <li>{{err}}</li>
                    }
                </ul>
            </div>
        }
        <button [disabled]="registerForm.invalid" type="submit" class="w-full py-2">Register</button>
    </form>

</mat-card>
<mat-card class="max-w-lg mx-auto mt-3 p-2">
<pre> Form Values:{{registerForm.value|json}}</pre>
</mat-card>
