<div class="mx-auto max-w-4xl flex-1 w-full space-y-6" >
    <div class="space-y-4 rounded-lg border border-gray-200 bg-white shadow-sm p-4">
        <p class="text-xl font-semibold">
            Order summary
        </p>
        <div class="space-y-4">
            <div clss=""space-y-2>
                <dl class="justify-between gap-4 flex items-center">
                    <dt class="font-medium text-gray-500">Subtotal</dt>
                        <dd class="font-medium text-gray-900">
                          {{cartSrvc.totals()?.subTotal | currency}}
                        </dd>
                </dl>
                 <dl class="justify-between gap-4 flex items-center">
                    <dt class="font-medium text-gray-500">Discount</dt>
                        <dd class="font-medium text-green-500">
                         - {{cartSrvc.totals()?.discount|currency}}
                        </dd>
                </dl>
                 <dl class="justify-between gap-4 flex items-center">
                    <dt class="font-medium text-gray-500">Delivery fee</dt>
                        <dd class="font-medium text-gray-900">
                          {{cartSrvc.totals()?.shipping|currency}}
                        </dd>
                </dl>
            </div>
             <dl class="justify-between gap-4 flex items-center border-t border-gray-200 pt-2">
                    <dt class="font-medium text-gray-500">Total</dt>
                        <dd class="font-medium text-gray-900">
                         {{cartSrvc.totals()?.total | currency}}
                        </dd>
                </dl>
        </div>
        <div class="flex flex-col gap-2">
            <button mat-flat-button routerLink="/checkout">
                checkout
            </button>
            <button mat-button routerLink="/shop">
                Continue shopping
            </button>
        </div>

    </div>
    <div class="rounded-lg border border-gray-200 space-y-4 bg-white shadow-sm">
        <form class="space-y-2 flex flex-col p-2">
            <label class="mb-2 block text-sm font-medium">
                Do you have a voucher code?
            </label>
            <mat-form-field appearance="outline">
                <mat-label>Voucher code</mat-label>
                <input type="text" matInput>
            </mat-form-field>
            <button mat-flat-button>Apply code</button>
        </form>
    </div>
</div>
