<header class="shadow-md p-3 w-full max-h-20 fixed top-0 z-50 bg-white">
  <div class="flex items-center justify-between max-w-7xl mx-auto px-4">

    <!-- Logo -->
    <img routerLink="/" src="images/logo.png" alt="logo" class="max-h-16 cursor-pointer">

    <!-- Nav -->
    <nav class="flex gap-4 text-lg uppercase">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Home</a>
      <a routerLink="/shop" routerLinkActive="active">Shop</a>
      <a routerLink="/test-error" routerLinkActive="active">Error</a>
    </nav>

    <!-- Right section -->
    <div class="flex items-center gap-4">

      <!-- Cart -->
      <a 
        routerLink="/cart" 
        routerLinkActive="active"
        [matBadge]="cartSrvc.itemCount()" 
        matBadgeSize="large"
        class="custom-badge mt-2 mr-2"
      >
        <mat-icon>shopping_cart</mat-icon>
      </a>
      @if(accountSrvc.currentUser())
      {
        <button mat-button [mat-menu-trigger-for]="menu">
          <mat-icon>arrow_drop_down</mat-icon>
          <span>{{accountSrvc.currentUser()?.email}}</span>
        </button>
      }
      @else
      {
      <button routerLink="account/login">Login</button>
      <button routerLink="account/register">Register</button>
      }
    </div>
  </div>
</header>

@if (busyService.loading) {
  <mat-progress-bar 
    mode="indeterminate" 
    class="fixed top-20 left-0 w-full z-50">
  </mat-progress-bar>
}
<mat-menu #menu="matMenu" class="px-5">
  <button mat-menu-item class="px-3" routerLink="/cart">
    <mat-icon>shopping_cart</mat-icon>
    My Cart
  </button>
  <button mat-menu-item class="px-3" routerLink="/orders">
    <mat-icon>history</mat-icon>
    My Orders
  </button>
 <button mat-menu-item class="px-3" (click)="logout()">
    <mat-icon>logout</mat-icon>
    Logout
  </button>

</mat-menu>
